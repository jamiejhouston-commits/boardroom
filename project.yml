name: HermesMobile
options:
  bundleIdPrefix: com.jamiehouston
  deploymentTarget:
    iOS: "18.0"
# Team ID comes from Signing.xcconfig → Signing.local.xcconfig (gitignored),
# so it's never committed. Forkers set their team in Xcode → Signing.
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
schemes:
  HermesMobile:
    build:
      targets:
        HermesMobile: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  HermesMobile:
    type: application
    platform: iOS
    sources:
      - HermesMobile/Sources/HermesMobile
    info:
      path: HermesMobile/Info.plist
      properties:
        CFBundleDisplayName: Boardroom
        LSApplicationCategoryType: public.app-category.productivity
        NSSupportsLiveActivities: true
        NSBonjourServices: [_hermes-relay._tcp]
        UIBackgroundModes: [fetch]
        BGTaskSchedulerPermittedIdentifiers: [com.jamiehouston.boardroom.companyRefresh]
        NSLocalNetworkUsageDescription: Connect to the Hermes Mobile relay running on your Mac.
        NSCameraUsageDescription: Scan relay pairing codes and place your Hermes headquarters in augmented reality.
        NSMicrophoneUsageDescription: Record voice notes to send to Hermes.
        NSSpeechRecognitionUsageDescription: Transcribe voice notes before sending them to Hermes.
        NSPhotoLibraryUsageDescription: Attach photos to your messages to Hermes agents.
        NSCalendarsWriteOnlyAccessUsageDescription: Add your Hermes meetings to your calendar with a 15-minute alert.
        NSCalendarsUsageDescription: Add your Hermes meetings to your calendar with a 15-minute alert.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamiehouston.boardroom
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: HermesMobile/HermesMobile.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jamiehouston.boardroom
    dependencies:
      - target: HermesWidgets
        embed: true
  HermesWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: HermesWidgets
        excludes:
          - Info.plist
      # Shared with the app so ActivityAttributes match and the widgets can read
      # the snapshot the app writes. Compiled into both targets by design.
      - path: HermesMobile/Sources/HermesMobile/Models/HermesActivityAttributes.swift
      - path: HermesMobile/Sources/HermesMobile/Models/CompanySnapshot.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamiehouston.boardroom.widgets
        INFOPLIST_FILE: HermesWidgets/Info.plist
    entitlements:
      path: HermesWidgets/HermesWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jamiehouston.boardroom
  HermesMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HermesMobile/Tests/HermesMobileTests
    dependencies:
      - target: HermesMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamiehouston.boardroom.tests
        GENERATE_INFOPLIST_FILE: YES
